name: CI

on:
    workflow_dispatch:
    pull_request:
        paths-ignore:
            - "coverage/**"
            - "docs/**"
            - "**/*.md"
            - "README*"
            - "readme*"
            - "LICENSE*"
            - "license*"
            - "*.vsix"
    push:
        branches:
            - main
        paths-ignore:
            - "coverage/**"
            - "docs/**"
            - "**/*.md"
            - "README*"
            - "readme*"
            - "LICENSE*"
            - "license*"
            - "*.vsix"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci --ignore-scripts

            - name: Run ESLint
              run: npm run lint

    typecheck:
        name: Typecheck
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci --ignore-scripts

            - name: Run TypeScript
              run: npm run typecheck

    unit-tests:
        name: Unit Tests
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci --ignore-scripts

            - name: Run unit coverage
              run: npm test -- --coverage

            - name: Upload unit coverage
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: unit-coverage
                  path: coverage/unit/
                  if-no-files-found: warn

    integration-tests:
        name: Integration Tests
        runs-on: ubuntu-24.04
        env:
            DEBIAN_FRONTEND: noninteractive
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install VS Code runtime dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends \
                    xvfb xauth dbus-x11 \
                    libnss3 libnspr4 libdbus-1-3 \
                    libatk1.0-0 libatk-bridge2.0-0 \
                    libcups2 libdrm2 libgbm1 \
                    libxkbcommon0 libxcomposite1 libxdamage1 \
                    libxfixes3 libxrandr2 \
                    libasound2t64 libgtk-3-0 libpangocairo-1.0-0 \
                    ca-certificates git

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci --ignore-scripts

            - name: Trust fixture repositories
              run: git config --global --add safe.directory '*'

            - name: Compile extension and integration tests
              run: npm run prepare:integration

            - name: Run integration coverage
              run: dbus-run-session -- xvfb-run -a npm exec -- vscode-test --coverage --coverage-output coverage/integration

            - name: Upload integration coverage
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: integration-coverage
                  path: coverage/integration/
                  if-no-files-found: warn

